openapi: 3.1.0
info:
  title: Anthropic Claude Compatible Endpoint
  description: Anthropic Messages API compatible endpoint supporting all Claude models via Upmore
  version: 1.0.0
servers:
  - url: https://api.upmore.net
security:
  - bearerAuth: []
paths:
  /v1/messages:
    post:
      operationId: createMessage
      summary: Create a Message
      description: Send a structured list of input messages with text and/or image content, and the model will generate the next message in the conversation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - max_tokens
                - messages
              properties:
                model:
                  type: string
                  enum:
                    - MiniMax-M3
                    - MiniMax-M2.7
                    - MiniMax-M2.7-highspeed
                    - MiniMax-M2.5
                    - MiniMax-M2.5-highspeed
                    - MiniMax-M2.1
                    - MiniMax-M2.1-highspeed
                    - MiniMax-M2
                    - doubao-seed-2-1-pro
                    - doubao-seed-2-1-turbo
                    - gpt-5.5
                  description: The model that will complete your prompt.
                  example: MiniMax-M3
                messages:
                  type: array
                  minItems: 1
                  description: Input messages. Each message has a role and content.
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                        description: The role of the message author.
                      content:
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                  enum: [text, image]
                                text:
                                  type: string
                                source:
                                  type: object
                                  properties:
                                    type:
                                      type: string
                                    media_type:
                                      type: string
                                    data:
                                      type: string
                        description: The content of the message. Either a string or an array of content blocks.
                  example:
                    - role: user
                      content: Hello, Claude!
                max_tokens:
                  type: integer
                  minimum: 1
                  description: The maximum number of tokens to generate before stopping.
                  example: 1024
                system:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                          text:
                            type: string
                  description: System prompt. Provides context and instructions to Claude.
                metadata:
                  type: object
                  properties:
                    user_id:
                      type: string
                      description: An external identifier for the user who is associated with the request.
                  description: An object describing metadata about the request.
                stop_sequences:
                  type: array
                  items:
                    type: string
                  description: Custom text sequences that will cause the model to stop generating.
                temperature:
                  type: number
                  minimum: 0
                  maximum: 1
                  default: 1
                  description: Amount of randomness injected into the response. Ranges from 0.0 to 1.0.
                  example: 1
                top_p:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: Use nucleus sampling. Recommended to use either temperature or top_p, but not both.
                top_k:
                  type: integer
                  minimum: 0
                  description: Only sample from the top K options for each subsequent token.
                stream:
                  type: boolean
                  default: false
                  description: Whether to incrementally stream the response using server-sent events.
                tools:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - input_schema
                    properties:
                      name:
                        type: string
                        description: Name of the tool.
                      description:
                        type: string
                        description: Description of what the tool does.
                      input_schema:
                        type: object
                        description: JSON Schema for the tool input.
                  description: Definitions of tools that the model may use.
                tool_choice:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [auto, any, tool]
                      description: How the model should use the provided tools.
                    name:
                      type: string
                      description: The name of the tool to use (when type is "tool").
                  description: How the model should use the provided tools.
                thinking:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [enabled, disabled]
                      description: Whether to enable extended thinking.
                    budget_tokens:
                      type: integer
                      minimum: 1024
                      description: The maximum number of tokens to use for thinking.
                  description: Configuration for extended thinking. When enabled, the model will think before responding.
      responses:
        "200":
          description: Message created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Message:
      type: object
      required:
        - id
        - type
        - role
        - content
        - model
        - stop_reason
        - usage
      properties:
        id:
          type: string
          example: msg_01XFDUDYJgAACzvnptvVoYEL
        type:
          type: string
          example: message
        role:
          type: string
          example: assistant
        content:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [text, thinking, tool_use]
              text:
                type: string
              thinking:
                type: string
              id:
                type: string
              name:
                type: string
              input:
                type: object
          example:
            - type: text
              text: Hello! How can I help you today?
        model:
          type: string
          example: MiniMax-M3
        stop_reason:
          type: string
          enum: [end_turn, max_tokens, stop_sequence, tool_use, null]
        stop_sequence:
          type: string
          nullable: true
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
            cache_creation_input_tokens:
              type: integer
            cache_read_input_tokens:
              type: integer

    Error:
      type: object
      properties:
        type:
          type: string
          example: error
        error:
          type: object
          properties:
            type:
              type: string
            message:
              type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
