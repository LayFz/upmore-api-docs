openapi: 3.1.0
info:
  title: "Seedance 1.0 Pro i2v"
  description: "ByteDance Seedance 1.0 Pro image-to-video generation via AnyFast API"
  version: 1.0.0
servers:
  - url: https://www.anyfast.ai
security:
  - bearerAuth: []
paths:
  /v1/video/generations:
    post:
      operationId: createSeedance10ProI2v
      summary: Create Image-to-Video Task
      description: "Generate a video from reference images using the doubao-seedance-1-0-pro-250528 model."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - content
              properties:
                model:
                  type: string
                  enum:
                    - doubao-seedance-1-0-pro-250528
                  description: Model ID
                  example: doubao-seedance-1-0-pro-250528
                content:
                  type: array
                  minItems: 2
                  description: "Multimodal content array with text prompt and reference image(s)."
                  items:
                    oneOf:
                      - type: object
                        description: Text prompt
                        required:
                          - type
                          - text
                        properties:
                          type:
                            type: string
                            enum: [text]
                          text:
                            type: string
                            description: "Text prompt for video generation."
                      - type: object
                        description: "Reference image with role."
                        required:
                          - type
                          - image_url
                        properties:
                          type:
                            type: string
                            enum: [image_url]
                          image_url:
                            type: object
                            required:
                              - url
                            properties:
                              url:
                                type: string
                                description: Image URL
                          role:
                            type: string
                            enum: [first_frame, last_frame]
                            description: "Role of the image: first_frame or last_frame."
                ratio:
                  type: string
                  enum: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", "adaptive"]
                  default: "16:9"
                  description: "Aspect ratio. adaptive is supported for i2v."
                  example: "adaptive"
                resolution:
                  type: string
                  enum: ["480p", "720p", "1080p"]
                  default: "720p"
                  description: "Output resolution."
                  example: "720p"
                duration:
                  type: integer
                  minimum: 2
                  maximum: 12
                  default: 5
                  description: "Video duration in seconds (2-12)."
                  example: 5
                watermark:
                  type: boolean
                  default: false
                  description: "Whether to include watermark."
                seed:
                  type: integer
                  description: "Random seed for reproducibility."
                camera_fixed:
                  type: boolean
                  default: false
                  description: "Fix camera position."
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: "gen-abc123"
                  model:
                    type: string
                    example: doubao-seedance-1-0-pro-250528
                  status:
                    type: string
                    example: processing
                  created_at:
                    type: integer
                    example: 1773130665
        "401":
          description: Unauthorized
        "429":
          description: Rate limit exceeded
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
