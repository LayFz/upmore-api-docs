openapi: 3.1.0
info:
  title: "Seedance 1.5 Pro t2v"
  description: "ByteDance Seedance 1.5 Pro text-to-video generation via AnyFast API"
  version: 1.0.0
servers:
  - url: https://www.anyfast.ai
security:
  - bearerAuth: []
paths:
  /v1/video/generations:
    post:
      operationId: createSeedance15ProT2v
      summary: Create Text-to-Video Task
      description: "Generate a video from text using the doubao-seedance-1-5-pro-251215 model."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - content
              properties:
                model:
                  type: string
                  enum:
                    - doubao-seedance-1-5-pro-251215
                  description: Model ID
                  example: doubao-seedance-1-5-pro-251215
                content:
                  type: array
                  minItems: 1
                  description: "Content array with a text prompt."
                  items:
                    type: object
                    required:
                      - type
                      - text
                    properties:
                      type:
                        type: string
                        enum: [text]
                      text:
                        type: string
                        description: "Text prompt for video generation."
                ratio:
                  type: string
                  enum: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9"]
                  default: "16:9"
                  description: "Aspect ratio. adaptive is NOT supported for t2v."
                  example: "16:9"
                resolution:
                  type: string
                  enum: ["480p", "720p", "1080p"]
                  default: "720p"
                  description: "Output resolution."
                  example: "720p"
                duration:
                  type: integer
                  minimum: 4
                  maximum: 12
                  default: 5
                  description: "Video duration in seconds (4-12)."
                  example: 5
                generate_audio:
                  type: boolean
                  default: false
                  description: "Generate audio with video. Only supported by this model."
                watermark:
                  type: boolean
                  default: false
                  description: "Whether to include watermark."
                seed:
                  type: integer
                  description: "Random seed for reproducibility."
                camera_fixed:
                  type: boolean
                  default: false
                  description: "Fix camera position."
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: "gen-abc123"
                  model:
                    type: string
                    example: doubao-seedance-1-5-pro-251215
                  status:
                    type: string
                    example: processing
                  created_at:
                    type: integer
                    example: 1773130665
        "401":
          description: Unauthorized
        "429":
          description: Rate limit exceeded
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
