openapi: 3.1.0
info:
  title: "Seedance 2.0 素材 — 创建素材"
  description: "通过 AnyFast API 上传素材（图片、视频、音频）到素材组"
  version: 1.0.0
servers:
  - url: https://www.anyfast.ai
security:
  - bearerAuth: []
paths:
  /volc/asset/CreateAsset:
    post:
      operationId: createAsset
      summary: 创建素材
      description: 上传素材到已有素材组，支持图片、视频和音频。支持 JSON（URL / Base64 / Data URI）和 multipart 文件上传两种方式。返回的素材 ID 可在 Seedance 2.0 请求中以 `Asset://<ID>` 格式使用。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - GroupId
                - AssetType
                - URL
              properties:
                model:
                  type: string
                  enum:
                    - volc-asset
                    - volc-asset-video
                    - volc-asset-audio
                  description: '计费模型。图片默认 `volc-asset`，视频必须传 `volc-asset-video`，音频必须传 `volc-asset-audio`。'
                  example: volc-asset
                GroupId:
                  type: string
                  description: 素材组 ID。
                  example: "group-20260319072926-rrnmg"
                Name:
                  type: string
                  description: 素材名称。
                  example: "character-reference"
                AssetType:
                  type: string
                  enum: [Image, Video, Audio]
                  description: '素材类型：`Image`、`Video` 或 `Audio`。'
                  example: Image
                URL:
                  type: string
                  description: 素材 URL、Data URI 或纯 Base64 字符串。Base64/Data URI 会自动上传到对象存储。
                  example: "https://example.com/image.jpg"
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - GroupId
              properties:
                model:
                  type: string
                  enum:
                    - volc-asset
                    - volc-asset-video
                    - volc-asset-audio
                  description: '计费模型。图片默认 `volc-asset`，视频传 `volc-asset-video`，音频传 `volc-asset-audio`。'
                file:
                  type: string
                  format: binary
                  description: 要上传的文件。
                GroupId:
                  type: string
                  description: 素材组 ID。
                Name:
                  type: string
                  description: 素材名称，默认使用文件名（去掉扩展名）。
                AssetType:
                  type: string
                  enum: [Image, Video, Audio]
                  default: Image
                  description: '素材类型，默认 `Image`。'
      responses:
        "200":
          description: 素材创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  Id:
                    type: string
                    description: 素材 ID。在 Seedance 2.0 请求中以 `Asset://<ID>` 格式引用。
                    example: "asset-20260320120147-pqwhc"
        "400":
          description: 请求参数有误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: 未授权
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
